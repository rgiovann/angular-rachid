        <button mat-flat-button class="btn-rateio" (click)="abrirRateio()" [disabled]="!podeCalcular">

        <button mat-flat-button class="btn-limpar" (click)="limparTudo()">

</div>

    <section>
      <app-despesas></app-despesas>
    </section>
  </div>
</main>
