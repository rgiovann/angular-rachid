<mat-card>
  <mat-card-header>
    <mat-card-title>Despesas</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    @for (despesa of despesas$ | async; track despesa.id) {
    <app-despesa [id]="despesa.id" [pessoa]="despesa.pessoaNome" [descricao]="despesa.descricao" [valor]="despesa.valor"
      [data]="despesa.data" (remover)="removerDespesa($event)">
    </app-despesa>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button (click)="abrirDialogNovaDespesa()">
      <mat-icon>add</mat-icon>
      Adicionar Despesa
    </button>
  </mat-card-actions>
</mat-card>
