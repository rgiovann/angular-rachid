<mat-toolbar class="header">

  <div class="header-inner">

    <!-- espaço vazio à esquerda (equilíbrio visual) -->
    <div class="side"></div>

    <!-- conteúdo central -->
    <div class="header-content">
      <img src="/rachid.png" alt="Logo" class="logo">

      <div class="text">
        <h1>Rachid</h1>
        <p>Sistema de Rateio Automático</p>
      </div>
    </div>

    <!-- ações à direita -->
    <div class="header-actions">
      <ng-content select="[header-actions]"></ng-content>
    </div>

  </div>

</mat-toolbar>
