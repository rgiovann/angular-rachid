<div class="mat-mdc-dialog-title dialog-title">Nova Pessoa</div>

<div mat-dialog-content>
  <mat-form-field appearance="fill" floatLabel="always" class="full-width">
    <mat-label>Nome</mat-label>

    <input matInput [formControl]="nomeControl" />

    @if (nomeControl.hasError('required') && nomeControl.touched && submetido) {
    <mat-error>Nome é obrigatório</mat-error>
    } @else if (nomeControl.hasError('duplicado')) {
    <mat-error>Pessoa já existe!</mat-error>
    }
  </mat-form-field>
</div>

<div mat-dialog-actions align="end">
  <button mat-button appPreventBlur (click)="fechar()">
    <mat-icon>close</mat-icon>
    Cancelar
  </button>

  <button mat-flat-button (click)="confirmar()">
    <mat-icon>check</mat-icon>
    Confirmar
  </button>
</div>
