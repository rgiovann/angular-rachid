<mat-card>
  <mat-card-header>
    <mat-card-title>Pessoas</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <!-- HEADER DA "TABELA" -->
    <div class="table-header">
      Nome
    </div>

    <div class="table-body">
      @for (pessoa of pessoas; track pessoa.id) {
      <app-pessoa [nome]="pessoa.nome"></app-pessoa>
      }
    </div>

  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button (click)="abrirDialogNovaPessoa()">
      <mat-icon>person_add</mat-icon>
      Adicionar Pessoa
    </button>
  </mat-card-actions>
</mat-card>
