<mat-card>
  <mat-card-header>
    <mat-card-title>Pessoas</mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <div class="table-body">
      @for (pessoa of pessoas$ | async; track pessoa.id) {
      <app-pessoa [pessoa]="pessoa" (remover)="removerPessoa($event)">
      </app-pessoa>
      }
    </div>

  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button (click)="abrirDialogNovaPessoa()">
      <mat-icon>person_add</mat-icon>
      Adicionar Pessoa
    </button>
  </mat-card-actions>
</mat-card>
